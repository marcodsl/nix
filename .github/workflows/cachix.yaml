name: Publish to Cachix

on:
  workflow_dispatch:

concurrency:
  group: cachix-${{ github.sha }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: canonical
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/disk-cleanup

      - uses: ./.github/actions/install-nix
        with:
          auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check flake
        run: nix flake check --no-pure-eval

      - name: Build NixOS system closures
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t hosts < <(
            find configurations/nixos -mindepth 1 -maxdepth 1 \( -type d -o -name '*.nix' \) -printf '%f\n' \
              | sed 's/\.nix$//' \
              | sort -u
          )

          if [ "${#hosts[@]}" -eq 0 ]; then
            echo "No NixOS hosts found under configurations/nixos" >&2
            exit 0
          fi

          printf 'Discovered NixOS hosts: %s\n' "${hosts[*]}"

          for host in "${hosts[@]}"; do
            echo "::group::Build system closure for ${host}"
            nix build ".#nixosConfigurations.${host}.config.system.build.toplevel" --no-pure-eval
            echo "::endgroup::"
          done

      - name: Build activate launcher
        run: nix build .#activate --no-pure-eval
