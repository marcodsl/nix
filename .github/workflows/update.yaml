name: Update lockfiles and packages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
      timezone: "America/New_York"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-lockfiles:
    name: Update lockfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/install-nix

      - name: Update flake.lock
        run: nix flake update

      - name: Update devenv.lock
        run: nix run nixpkgs#devenv -- update

      - name: Upload lockfile changes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lockfile-changes
          path: |
            flake.lock
            devenv.lock
          if-no-files-found: ignore

  update-packages:
    name: Update packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: codex
            script: packages/codex/update.rs
          - package: graphrag
            script: packages/graphrag/update.rs
          - package: context-mode
            script: packages/context-mode/update.rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/install-nix

      - name: Run ${{ matrix.package }} update script
        run: |
          chmod +x "${{ matrix.script }}"
          ./${{ matrix.script }}

      - name: Upload ${{ matrix.package }} changes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-${{ matrix.package }}
          path: packages/${{ matrix.package }}/default.nix
          if-no-files-found: ignore

  create-pr:
    name: Create pull request
    needs: [update-lockfiles, update-packages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download lockfile changes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: lockfile-changes
          path: .
        continue-on-error: true

      - name: Download package changes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: package-*
          merge-multiple: true
          path: .
        continue-on-error: true

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected."
            echo "has_changes=true" >> $GITHUB_OUTPUT

            echo "## Changed files" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            git diff --stat >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create pull request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          add-paths: |
            flake.lock
            devenv.lock
            packages/codex/default.nix
            packages/graphrag/default.nix
            packages/context-mode/default.nix
          commit-message: "ci: update lockfiles and packages"
          branch: ci/auto-update
          delete-branch: true
          title: "ci: update lockfiles and packages"
          body: |
            Automated update of lockfiles and package versions.

            - `flake.lock` and `devenv.lock` updated if newer revisions are available
            - `codex`, `graphrag`, and `context-mode` updated to latest upstream versions
          reviewers: |
            marcodsl
