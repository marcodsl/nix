name: cachix-publish

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - ci
    types:
      - completed
    branches:
      - main

concurrency:
  group: cachix-publish-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: canonical
    permissions:
      contents: read
    steps:
      - name: Clean up disk space
        if: runner.os == 'Linux'
        run: |
          echo "::group::Disk usage before cleanup"
          df -h /
          echo "::endgroup::"

          echo "::group::Cleaning up large directories"
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          echo "::endgroup::"

          echo "::group::Disk usage after cleanup"
          df -h /
          echo "::endgroup::"

      - name: Disable AppArmor unprivileged user namespace restriction
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/install-nix
        with:
          auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check flake
        run: nix flake check --no-pure-eval

      - name: Build NixOS system closures
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t hosts < <(
            find configurations/nixos -mindepth 1 -maxdepth 1 \( -type d -o -name '*.nix' \) -printf '%f\n' \
              | sed 's/\.nix$//' \
              | sort -u
          )

          if [ "${#hosts[@]}" -eq 0 ]; then
            echo "No NixOS hosts found under configurations/nixos" >&2
            exit 1
          fi

          printf 'Discovered NixOS hosts: %s\n' "${hosts[*]}"

          for host in "${hosts[@]}"; do
            echo "::group::Build system closure for ${host}"
            nix build ".#nixosConfigurations.${host}.config.system.build.toplevel" --no-pure-eval
            echo "::endgroup::"
          done

      - name: Build activate launcher
        run: nix build .#activate --no-pure-eval
