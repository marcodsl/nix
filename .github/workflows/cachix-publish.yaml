name: cachix-publish

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - secret-scan
    types:
      - completed
    branches:
      - main

concurrency:
  group: cachix-publish-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: canonical
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            sandbox = true
            experimental-features = nix-command flakes

      - name: Authenticate with Cachix
        uses: cachix/cachix-action@v15
        with:
          name: marcodsl
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check flake
        run: nix flake check --no-pure-eval

      - name: Build NixOS system closures
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t hosts < <(
            find configurations/nixos -mindepth 1 -maxdepth 1 \( -type d -o -name '*.nix' \) -printf '%f\n' \
              | sed 's/\.nix$//' \
              | sort -u
          )

          if [ "${#hosts[@]}" -eq 0 ]; then
            echo "No NixOS hosts found under configurations/nixos" >&2
            exit 1
          fi

          printf 'Discovered NixOS hosts: %s\n' "${hosts[*]}"

          for host in "${hosts[@]}"; do
            echo "::group::Build system closure for ${host}"
            nix build ".#nixosConfigurations.${host}.config.system.build.toplevel" --no-pure-eval
            echo "::endgroup::"
          done

      - name: Build activate launcher
        run: nix build .#activate --no-pure-eval
